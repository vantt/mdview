<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>mdview</title>
<style>
  @media (prefers-color-scheme: light) {
    html, body { height: 100%; margin: 0; font-family: system-ui, sans-serif; background: #fdfbf7; color: #0f172a; }
    .muted { color: #6c6f7c; font-size: 13px; }
  }
  @media (prefers-color-scheme: dark) {
    html, body { height: 100%; margin: 0; font-family: system-ui, sans-serif; background: #1a110c; color: #f5efe6; }
    .muted { color: #a4988e; font-size: 13px; }
  }
  .center { height: 100%; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 12px; }
</style>
</head>
<body>
<!-- Placeholder shown only if the daemon window fails to load; the app normally
     navigates straight to the local daemon URL. -->
<div class="center">
  <div>Starting mdview…</div>
  <div class="muted">Connecting to the local server at http://localhost:7700</div>
</div>
</body>
</html>
