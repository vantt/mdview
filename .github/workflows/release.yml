name: release

# Tag a version to cut a release:  git tag v0.1.0 && git push --tags
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            os: macos-13
            cross: false
          - target: aarch64-apple-darwin
            os: macos-14
            cross: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            cross: false
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      # The desktop crate is excluded from the workspace; only the CLI is built,
      # so no webview system libraries are needed here.
      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release -p mdview --target ${{ matrix.target }}
          else
            cargo build --release -p mdview --target ${{ matrix.target }}
          fi

      - name: Package
        shell: bash
        run: |
          bin="target/${{ matrix.target }}/release/mdview"
          asset="mdview-${{ matrix.target }}"
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            bin="$bin.exe"; asset="$asset.exe"
          fi
          cp "$bin" "$asset"
          echo "ASSET=$asset" >> "$GITHUB_ENV"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
          generate_release_notes: true
          fail_on_unmatched_files: true
